spring:
  application:
    name: oabelha
  datasource:
    url: jdbc:sqlite:database.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: teu-email@gmail.com
    password: tua-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true